<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .game-device {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 3px solid #444;
        }

        .screen-area {
            background: #000;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .info-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #0f0;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 5px #0f0;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-label {
            font-size: 0.8em;
            color: #0a0;
            margin-bottom: 3px;
        }

        .info-value {
            font-weight: bold;
            font-size: 1.2em;
        }

        #gameCanvas {
            border: 2px solid #0f0;
            background-color: #000;
            display: block;
            width: 100%;
            height: auto;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .controls-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
        }

        .direction-pad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 8px;
            justify-items: center;
            align-items: center;
        }

        .direction-pad button {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #667eea, #5568d3);
            color: white;
            font-size: 1.8em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .direction-pad button:active {
            background: linear-gradient(145deg, #5568d3, #667eea);
            transform: scale(0.9);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .direction-pad button:hover {
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }

        .center-button {
            grid-column: 2;
            grid-row: 2;
            width: 80px;
            height: 80px;
            font-size: 2em;
            background: linear-gradient(145deg, #10b981, #059669) !important;
            border-radius: 50% !important;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4) !important;
        }

        .center-button:active {
            transform: scale(0.95) !important;
        }

        .center-button:hover {
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5) !important;
        }

        .empty-cell {
            visibility: hidden;
        }

        .reset-button-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .reset-button-area button {
            padding: 8px 16px;
            background: linear-gradient(145deg, #ef4444, #dc2626);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .reset-button-area button:hover {
            box-shadow: 0 6px 15px rgba(239, 68, 68, 0.4);
        }

        .reset-button-area button:active {
            transform: scale(0.95);
        }

        .difficulty-label {
            color: #fff;
            font-size: 0.85em;
            margin-bottom: 8px;
            text-align: center;
        }

        .difficulty-options {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .difficulty-options label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #fff;
            font-size: 0.85em;
            cursor: pointer;
        }

        .difficulty-options input[type="radio"] {
            cursor: pointer;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            color: #ccc;
            font-size: 0.8em;
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.6;
        }

        .instructions h3 {
            color: #fff;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .instructions ul {
            margin-left: 15px;
        }

        .instructions li {
            margin-bottom: 4px;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
            z-index: 1000;
            display: none;
            min-width: 280px;
            border: 2px solid #667eea;
        }

        .game-over.show {
            display: block;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .game-over h2 {
            color: #ef4444;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .game-over p {
            font-size: 1.1em;
            color: #fff;
            margin-bottom: 10px;
        }

        .game-over button {
            margin-top: 20px;
            background: linear-gradient(145deg, #667eea, #5568d3);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        @media (max-width: 480px) {
            .game-device {
                padding: 15px;
            }

            .screen-area {
                padding: 12px;
                margin-bottom: 15px;
            }

            .info-bar {
                font-size: 0.8em;
                margin-bottom: 12px;
            }

            .controls-area {
                gap: 12px;
                margin-bottom: 15px;
            }

            .direction-pad button {
                width: 45px;
                height: 45px;
                font-size: 1.3em;
            }

            .center-controls button {
                padding: 10px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-device">
            <h1 style="color: white; margin-bottom: 15px; font-size: 1.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">🐍 贪吃蛇</h1>
            
            <div class="screen-area">
                <div class="info-bar">
                    <div class="info-item">
                        <div class="info-label">分数</div>
                        <div class="info-value" id="score">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">长度</div>
                        <div class="info-value" id="length">1</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">难度</div>
                        <div class="info-value" id="difficulty">简单</div>
                    </div>
                </div>

                <canvas id="gameCanvas" width="400" height="400"></canvas>
            </div>

            <div class="difficulty-area">
                <div class="difficulty-label">🎮 难度选择</div>
                <div class="difficulty-options">
                    <label>
                        <input type="radio" name="difficulty" value="easy" checked> 简单
                    </label>
                    <label>
                        <input type="radio" name="difficulty" value="normal"> 普通
                    </label>
                    <label>
                        <input type="radio" name="difficulty" value="hard"> 困难
                    </label>
                </div>
                <div class="reset-button-area">
                    <button id="resetBtn">🔄 重置游戏</button>
                </div>
            </div>

            <div class="controls-area">
                <div class="direction-pad">
                    <div class="empty-cell"></div>
                    <button id="upBtn">⬆️</button>
                    <div class="empty-cell"></div>
                    
                    <button id="leftBtn">⬅️</button>
                    <button id="startBtn" class="center-button">▶️</button>
                    <button id="rightBtn">➡️</button>

                    <div class="empty-cell"></div>
                    <button id="downBtn">⬇️</button>
                    <div class="empty-cell"></div>
                </div>
            </div>

            <div class="instructions">
                <h3>📖 游戏说明</h3>
                <ul>
                    <li>点击方向按钮控制蛇的移动</li>
                    <li>电脑上也可以用键盘 ↑↓←→ 或 WASD</li>
                    <li>吃掉红色食物得分，撞墙或撞自己结束</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="game-over" id="gameOverModal">
        <h2>游戏结束！</h2>
        <p>分数：<span id="finalScore">0</span></p>
        <p>长度：<span id="finalLength">1</span></p>
        <button onclick="resetGame()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        // 游戏状态
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameSpeed = 0.167;
        let frameCount = 0;

        // 难度配置
        const difficultySettings = {
            easy: 0.167,      // 1秒/格
            normal: 0.333,   // 0.5秒/格
            hard: 0.667       // 0.25秒/格
        };

        // 初始化
        function init() {
            snake = [{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            gameRunning = false;
            gamePaused = false;
            frameCount = 0;
            updateUI();
            draw();
        }

        // 生成食物
        function generateFood() {
            let newFood;
            let isOnSnake = true;
            
            while (isOnSnake) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                
                isOnSnake = snake.some(segment => 
                    segment.x === newFood.x && segment.y === newFood.y
                );
            }
            
            food = newFood;
        }

        // 更新游戏状态
        function update() {
            if (!gameRunning || gamePaused) return;

            frameCount++;
            if (frameCount < Math.floor(10 / gameSpeed)) return;
            frameCount = 0;

            // 更新方向
            direction = nextDirection;

            // 计算新的蛇头位置
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // 检查碰撞（墙壁）
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // 检查碰撞（自己）
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            // 添加新头
            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                generateFood();
            } else {
                // 移除尾部
                snake.pop();
            }

            updateUI();
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（可选）
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头 - 绿色
                    ctx.fillStyle = '#10b981';
                    ctx.shadowColor = '#10b981';
                    ctx.shadowBlur = 10;
                } else {
                    // 蛇身 - 浅绿色
                    ctx.fillStyle = '#34d399';
                    ctx.shadowColor = 'transparent';
                }
                
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });

            // 绘制食物
            ctx.fillStyle = '#ef4444';
            ctx.shadowColor = '#ef4444';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            ctx.shadowColor = 'transparent';
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
        }

        // 游戏结束
        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLength').textContent = snake.length;
            document.getElementById('gameOverModal').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }

        // 重置游戏
        function resetGame() {
            document.getElementById('gameOverModal').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
            init();
        }

        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 事件监听
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!gameRunning) {
                gameRunning = true;
                gamePaused = false;
                document.getElementById('startBtn').textContent = '⏸️';
            } else if (gamePaused) {
                gamePaused = false;
                document.getElementById('startBtn').textContent = '⏸️';
            } else {
                gamePaused = true;
                document.getElementById('startBtn').textContent = '▶️';
            }
        });

        document.getElementById('resetBtn').addEventListener('click', resetGame);

        // 难度选择
        document.querySelectorAll('input[name="difficulty"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                gameSpeed = difficultySettings[e.target.value];
                const difficultyNames = {easy: '简单', normal: '普通', hard: '困难'};
                document.getElementById('difficulty').textContent = difficultyNames[e.target.value];
            });
        });

        // 键盘控制（电脑版）
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            const key = e.key.toLowerCase();
            
            // 防止默认行为
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd'].includes(key)) {
                e.preventDefault();
            }

            // 更新方向
            switch(key) {
                case 'arrowup':
                case 'w':
                    if (direction.y === 0) nextDirection = {x: 0, y: -1};
                    break;
                case 'arrowdown':
                case 's':
                    if (direction.y === 0) nextDirection = {x: 0, y: 1};
                    break;
                case 'arrowleft':
                case 'a':
                    if (direction.x === 0) nextDirection = {x: -1, y: 0};
                    break;
                case 'arrowright':
                case 'd':
                    if (direction.x === 0) nextDirection = {x: 1, y: 0};
                    break;
            }
        });

        // 方向按钮控制（手机版）
        document.getElementById('upBtn').addEventListener('click', () => {
            if (gameRunning && direction.y === 0) nextDirection = {x: 0, y: -1};
        });

        document.getElementById('downBtn').addEventListener('click', () => {
            if (gameRunning && direction.y === 0) nextDirection = {x: 0, y: 1};
        });

        document.getElementById('leftBtn').addEventListener('click', () => {
            if (gameRunning && direction.x === 0) nextDirection = {x: -1, y: 0};
        });

        document.getElementById('rightBtn').addEventListener('click', () => {
            if (gameRunning && direction.x === 0) nextDirection = {x: 1, y: 0};
        });

        // 启动游戏循环
        init();
        gameLoop();
    </script>
</body>
</html>
