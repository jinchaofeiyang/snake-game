<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-wrapper {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .info-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2em;
            color: #333;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-weight: bold;
            color: #667eea;
            font-size: 1.5em;
        }

        #gameCanvas {
            border: 3px solid #333;
            background-color: #1a1a1a;
            display: block;
            margin: 0 auto 20px;
            border-radius: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        #startBtn {
            background-color: #667eea;
            color: white;
        }

        #startBtn:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #pauseBtn {
            background-color: #f59e0b;
            color: white;
        }

        #pauseBtn:hover {
            background-color: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
        }

        #resetBtn {
            background-color: #ef4444;
            color: white;
        }

        #resetBtn:hover {
            background-color: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        .instructions {
            background-color: #f3f4f6;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: left;
            color: #333;
            font-size: 0.95em;
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .instructions ul {
            margin-left: 20px;
            line-height: 1.8;
        }

        .instructions li {
            margin-bottom: 5px;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 1000;
            display: none;
            min-width: 300px;
        }

        .game-over.show {
            display: block;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .game-over h2 {
            color: #ef4444;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .game-over p {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 10px;
        }

        .game-over button {
            margin-top: 20px;
            background-color: #667eea;
            color: white;
            padding: 12px 30px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .difficulty {
            margin-bottom: 20px;
        }

        .difficulty label {
            margin-right: 15px;
            font-size: 1em;
            color: #333;
        }

        .difficulty input[type="radio"] {
            margin-right: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 贪吃蛇游戏</h1>
        
        <div class="game-wrapper">
            <div class="info-bar">
                <div class="info-item">
                    <div class="info-label">分数</div>
                    <div class="info-value" id="score">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">蛇长</div>
                    <div class="info-value" id="length">1</div>
                </div>
                <div class="info-item">
                    <div class="info-label">难度</div>
                    <div class="info-value" id="difficulty">简单</div>
                </div>
            </div>

            <canvas id="gameCanvas" width="400" height="400"></canvas>

            <div class="difficulty">
                <label>
                    <input type="radio" name="difficulty" value="easy" checked> 简单
                </label>
                <label>
                    <input type="radio" name="difficulty" value="normal"> 普通
                </label>
                <label>
                    <input type="radio" name="difficulty" value="hard"> 困难
                </label>
            </div>

            <div class="controls">
                <button id="startBtn">开始游戏</button>
                <button id="pauseBtn">暂停</button>
                <button id="resetBtn">重置</button>
            </div>

            <div class="instructions">
                <h3>📖 游戏说明</h3>
                <ul>
                    <li><strong>方向控制：</strong>使用 ↑ ↓ ← → 箭头键或 W A S D 键控制蛇的方向</li>
                    <li><strong>目标：</strong>吃掉红色的食物，蛇会变长</li>
                    <li><strong>游戏结束：</strong>蛇撞到墙壁或自己的身体</li>
                    <li><strong>难度说明：</strong>简单(1秒/格) / 普通(0.5秒/格) / 困难(0.25秒/格)</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="game-over" id="gameOverModal">
        <h2>游戏结束！</h2>
        <p>最终分数：<span id="finalScore">0</span></p>
        <p>蛇的长度：<span id="finalLength">1</span></p>
        <button onclick="resetGame()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        // 游戏状态
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameSpeed = 0.167;
        let frameCount = 0;

        // 难度配置
        const difficultySettings = {
            easy: 0.167,      // 1秒/格
            normal: 0.333,   // 0.5秒/格
            hard: 0.667       // 0.25秒/格
        };

        // 初始化
        function init() {
            snake = [{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            gameRunning = false;
            gamePaused = false;
            frameCount = 0;
            updateUI();
            draw();
        }

        // 生成食物
        function generateFood() {
            let newFood;
            let isOnSnake = true;
            
            while (isOnSnake) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                
                isOnSnake = snake.some(segment => 
                    segment.x === newFood.x && segment.y === newFood.y
                );
            }
            
            food = newFood;
        }

        // 更新游戏状态
        function update() {
            if (!gameRunning || gamePaused) return;

            frameCount++;
            if (frameCount < Math.floor(10 / gameSpeed)) return;
            frameCount = 0;

            // 更新方向
            direction = nextDirection;

            // 计算新的蛇头位置
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // 检查碰撞（墙壁）
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // 检查碰撞（自己）
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            // 添加新头
            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                generateFood();
            } else {
                // 移除尾部
                snake.pop();
            }

            updateUI();
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（可选）
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头 - 绿色
                    ctx.fillStyle = '#10b981';
                    ctx.shadowColor = '#10b981';
                    ctx.shadowBlur = 10;
                } else {
                    // 蛇身 - 浅绿色
                    ctx.fillStyle = '#34d399';
                    ctx.shadowColor = 'transparent';
                }
                
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });

            // 绘制食物
            ctx.fillStyle = '#ef4444';
            ctx.shadowColor = '#ef4444';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            ctx.shadowColor = 'transparent';
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
        }

        // 游戏结束
        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLength').textContent = snake.length;
            document.getElementById('gameOverModal').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }

        // 重置游戏
        function resetGame() {
            document.getElementById('gameOverModal').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
            init();
        }

        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 事件监听
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!gameRunning) {
                gameRunning = true;
                gamePaused = false;
                document.getElementById('startBtn').textContent = '继续';
                document.getElementById('pauseBtn').textContent = '暂停';
            }
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (gameRunning) {
                gamePaused = !gamePaused;
                document.getElementById('pauseBtn').textContent = gamePaused ? '继续' : '暂停';
            }
        });

        document.getElementById('resetBtn').addEventListener('click', resetGame);

        // 难度选择
        document.querySelectorAll('input[name="difficulty"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                gameSpeed = difficultySettings[e.target.value];
                const difficultyNames = {easy: '简单', normal: '普通', hard: '困难'};
                document.getElementById('difficulty').textContent = difficultyNames[e.target.value];
            });
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            const key = e.key.toLowerCase();
            
            // 防止默认行为
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd'].includes(key)) {
                e.preventDefault();
            }

            // 更新方向
            switch(key) {
                case 'arrowup':
                case 'w':
                    if (direction.y === 0) nextDirection = {x: 0, y: -1};
                    break;
                case 'arrowdown':
                case 's':
                    if (direction.y === 0) nextDirection = {x: 0, y: 1};
                    break;
                case 'arrowleft':
                case 'a':
                    if (direction.x === 0) nextDirection = {x: -1, y: 0};
                    break;
                case 'arrowright':
                case 'd':
                    if (direction.x === 0) nextDirection = {x: 1, y: 0};
                    break;
            }
        });

        // 启动游戏循环
        init();
        gameLoop();
    </script>
</body>
</html>
